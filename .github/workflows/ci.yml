name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Lint & Test
        working-directory: backend
        run: |
          go mod tidy
          go vet ./...
          go build ./...
          go test -short -race ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build & Lint
        working-directory: frontend
        run: |
          npm ci
          npx tsc -b --noEmit
          npx vite build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase repo
        id: vars
        run: echo "LOWER_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.LOWER_REPO }}/backend:${{ github.sha }},ghcr.io/${{ steps.vars.outputs.LOWER_REPO }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.LOWER_REPO }}/frontend:${{ github.sha }},ghcr.io/${{ steps.vars.outputs.LOWER_REPO }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    if: github.event_name == 'pull_request'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Start services
        run: |
          docker compose up -d db redis paddleocr
          docker compose build backend frontend
          docker compose up -d backend frontend
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/api/v1/health | grep -q '"status":"ok"'; then
              echo "Backend ready"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "Backend not ready after 60s"
          docker compose logs backend --tail 30
          exit 1
      - name: Run API tests
        run: |
          docker compose run --rm e2e npx playwright test tests/api.spec.ts
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
