name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOPROXY: https://goproxy.cn,direct
  GOCACHE: /tmp/gocache

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (short — skip DB-dependent)
        run: go test -v -count=1 -short -race ./... 2>&1 | tail -20

      - name: Coverage check (≥ 30%)
        run: |
          PKGS="./internal/app/service/... ./internal/app/task/... \
                ./internal/app/middleware/... \
                ./internal/infra/cache/... ./internal/infra/queue/..."
          go test -count=1 -short -coverprofile=coverage.out -covermode=atomic $PKGS
          go tool cover -func=coverage.out | tail -5
          total=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ "$(echo "${total} < 30" | bc)" = "1" ]; then
            echo "FAIL: coverage ${total}% < 30%"
            exit 1
          fi
          echo "PASS: coverage ${total}% >= 30%"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: personal-bookkeeping-backend:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: personal-bookkeeping-frontend:ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
